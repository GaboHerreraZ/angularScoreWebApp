<div class="bg-surface-0 dark:bg-surface-950 min-h-screen w-screen">
    <main class="landing-wrapper">
        <header-widget />
        <hero-widget />
        <stats-widget />
        <features-widget />
        <security-widget />
        <testimonials-widget />
        <pricing-widget />
        <faq-widget />
        <join-widget />
        <footer-widget />
    </main>
</div>

<!-- Dialog Acceso Revocado -->
<p-dialog header="Acceso restringido" [(visible)]="blockedDialogVisible" [modal]="true" [style]="{ width: '28rem' }" [draggable]="false" [closable]="true">
    <div class="flex flex-col items-center gap-4 text-center">
        <i class="pi pi-lock text-red-500 text-5xl"></i>
        <h3 class="font-bold text-xl m-0">Tus permisos han sido revocados</h3>
        <p class="text-muted-color m-0">Ya no tienes acceso a la plataforma. Si crees que esto es un error, contacta al administrador de tu empresa para que restablezca tus permisos.</p>
    </div>
    <ng-template #footer>
        <p-button label="Entendido" icon="pi pi-check" styleClass="w-full" (onClick)="blockedDialogVisible.set(false)" />
    </ng-template>
</p-dialog>
