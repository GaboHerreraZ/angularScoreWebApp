<app-configurator [simple]="true" />
<div class="min-h-screen w-full flex items-center justify-center bg-surface-50 dark:bg-surface-950 px-4 py-12">
    <div class="w-full max-w-2xl flex flex-col items-center text-center">
        <img src="/logo/creditia-logo.svg" alt="Creditia" class="h-16 mb-10 dark:hidden" />
        <img src="/logo/creditia-logo-dark.svg" alt="Creditia" class="h-16 mb-10 hidden dark:block" />
        <span class="block text-[10rem] sm:text-[14rem] font-black leading-none bg-linear-to-br from-primary to-primary/40 bg-clip-text text-transparent select-none mb-8">404</span>

        <h1 class="text-2xl sm:text-3xl font-bold text-surface-800 dark:text-surface-100 mb-3">Página no encontrada</h1>
        <p class="text-surface-500 mb-8 max-w-md">La página que buscas no existe o fue movida. Verifica la dirección o regresa al dashboard.</p>

        <div class="flex flex-col sm:flex-row gap-3 mb-12 w-full sm:w-auto">
            <p-button label="Volver atrás" icon="pi pi-arrow-left" severity="secondary" outlined (onClick)="goBack()" styleClass="w-full sm:w-auto"></p-button>
            <p-button label="Ir al Dashboard" icon="pi pi-home" [routerLink]="['/app']" styleClass="w-full sm:w-auto"></p-button>
        </div>

        <div class="w-full border-t border-surface-200 dark:border-surface-700 pt-8">
            <p class="text-xs uppercase tracking-wider text-surface-400 font-semibold mb-4">¿Qué buscabas?</p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <a [routerLink]="['/app/clientes']" class="flex items-center gap-3 p-3 rounded-lg border border-surface-200 dark:border-surface-700 hover:border-primary hover:bg-primary/5 transition-colors text-left">
                    <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-blue-100 dark:bg-blue-900/30 shrink-0">
                        <i class="pi pi-address-book text-blue-600 dark:text-blue-400"></i>
                    </span>
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-surface-800 dark:text-surface-100">Clientes</p>
                        <p class="text-xs text-surface-500 truncate">Gestionar tu cartera</p>
                    </div>
                </a>

                <a [routerLink]="['/app/estudio-credito']" class="flex items-center gap-3 p-3 rounded-lg border border-surface-200 dark:border-surface-700 hover:border-primary hover:bg-primary/5 transition-colors text-left">
                    <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-purple-100 dark:bg-purple-900/30 shrink-0">
                        <i class="pi pi-credit-card text-purple-600 dark:text-purple-400"></i>
                    </span>
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-surface-800 dark:text-surface-100">Créditos</p>
                        <p class="text-xs text-surface-500 truncate">Estudios de crédito</p>
                    </div>
                </a>

                <a [routerLink]="['/app/administracion']" class="flex items-center gap-3 p-3 rounded-lg border border-surface-200 dark:border-surface-700 hover:border-primary hover:bg-primary/5 transition-colors text-left">
                    <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-emerald-100 dark:bg-emerald-900/30 shrink-0">
                        <i class="pi pi-cog text-emerald-600 dark:text-emerald-400"></i>
                    </span>
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-surface-800 dark:text-surface-100">Administración</p>
                        <p class="text-xs text-surface-500 truncate">Cuenta y empresa</p>
                    </div>
                </a>
            </div>
        </div>

        <p class="text-xs text-surface-400 mt-8">
            ¿Necesitas ayuda? <a href="mailto:soporte@creditia.com" class="text-primary hover:underline">Contacta a soporte</a>
        </p>
    </div>
</div>
