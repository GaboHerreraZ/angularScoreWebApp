<div class="flex flex-col gap-6">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-2xl font-bold m-0 flex items-center gap-2">
                <i class="pi pi-credit-card text-primary"></i>
                Planes disponibles
            </h2>
            <p class="text-muted-color text-sm mt-1 mb-0">Selecciona el plan que mejor se adapte a las necesidades de tu empresa.</p>
        </div>
    </div>

    <app-subscription-plans-list
        [plans]="plans()"
        [loading]="plansResource.isLoading()"
        [ctaLabelFn]="ctaLabelFn"
        [ctaDisabledFn]="ctaDisabledFn"
        [showCurrentBadge]="true"
        (planAction)="onUpgrade($event)"
    />
</div>
