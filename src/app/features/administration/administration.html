<p-card>
    <p-tabs [value]="activeTab()" (valueChange)="onTabChange($event)">
        <p-tablist>
            <p-tab value="perfil">
                <i class="pi pi-user mr-2"></i>
                <span>Perfil</span>
            </p-tab>
            @if (isAdmin()) {
            <p-tab value="empresa">
                <i class="pi pi-building mr-2"></i>
                <span>Empresa</span>
            </p-tab>
            <p-tab value="suscripcion">
                <i class="pi pi-credit-card mr-2"></i>
                <span>Suscripción</span>
            </p-tab>
            }
        </p-tablist>
    </p-tabs>
    <div class="mt-4">
        <router-outlet />
    </div>
</p-card>
