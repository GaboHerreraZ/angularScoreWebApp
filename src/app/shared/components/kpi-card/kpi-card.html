<p-card styleClass="h-full">
    <div class="flex items-start justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0 flex-1">
            <div [class]="'flex items-center justify-center w-12 h-12 rounded-xl shrink-0 ' + color()">
                <i [class]="icon() + ' text-xl'"></i>
            </div>
            <div class="min-w-0">
                <p class="text-surface-500 text-sm truncate">{{ label() }}</p>
                <p class="text-2xl font-bold text-surface-800 dark:text-surface-100 leading-tight">
                    {{ formattedValue() ?? kpi().value }}@if (suffix()) {<span class="text-sm font-normal text-surface-500 ml-1">{{ suffix() }}</span>}
                </p>
            </div>
        </div>
        @if (trend() !== 'none') {
            <span
                [class]="'inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold shrink-0 ' + trendClass()"
                [pTooltip]="tooltipText()"
                tooltipPosition="top"
            >
                @if (trendIcon()) { <i [class]="trendIcon() + ' text-[10px]'"></i> }
                {{ deltaLabel() }}
            </span>
        }
    </div>
</p-card>
