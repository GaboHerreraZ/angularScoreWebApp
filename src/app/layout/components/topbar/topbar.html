<div class="layout-topbar">
    <a class="app-logo" routerLink="/app">
        <img alt="app logo" [src]="logo()" />
        <span class="app-name">Creditia</span>
    </a>

    <button #menubutton class="topbar-menubutton p-link cursor-pointer" type="button" (click)="onMenuButtonClick()">
        <span></span>
    </button>
    <ul class="topbar-menu">
        @for (item of tabs(); track item.routerLink; let i = $index) {
        <li>
            <a
                [routerLink]="item.routerLink"
                routerLinkActive="active-route"
                [routerLinkActiveOptions]="item.routerLinkActiveOptions || { paths: 'exact', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
                [fragment]="item.fragment"
                [queryParamsHandling]="item.queryParamsHandling"
                [preserveFragment]="item.preserveFragment!"
                [skipLocationChange]="item.skipLocationChange!"
                [replaceUrl]="item.replaceUrl!"
                [state]="item.state"
                [queryParams]="item.queryParams"
            >
                <span>{{ item.label }}</span>
            </a>
            <i class="pi pi-times" (click)="removeTab($event, i)"></i>
        </li>
        }
    </ul>

    <button
        type="button"
        class="topbar-search-trigger hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-100 dark:bg-surface-800 hover:bg-surface-200 dark:hover:bg-surface-700 text-sm text-surface-500 transition-colors cursor-pointer w-72 absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10"
        (click)="searchService.open()"
        pTooltip="Buscar (Ctrl+K)"
        tooltipPosition="bottom"
    >
        <i class="pi pi-search text-xs"></i>
        <span class="flex-1 text-left">Buscar...</span>
        <kbd class="inline-flex items-center px-1.5 py-0.5 text-[10px] rounded border border-surface-300 dark:border-surface-600">Ctrl K</kbd>
    </button>

    <div class="topbar-actions">
        <p-button icon="pi pi-question-circle" rounded severity="help" (onClick)="onHelpButtonClick()" pTooltip="Centro de Ayuda" tooltipPosition="bottom" size="small" styleClass="!text-base"></p-button>
        <p-button icon="pi pi-palette" rounded severity="secondary" (onClick)="onConfigButtonClick()" pTooltip="Configuración" tooltipPosition="bottom" size="small" styleClass="!text-base"></p-button>
        <span class="relative">
            <p-button icon="pi pi-bell" rounded severity="warn" (onClick)="onNotificationButtonClick()" pTooltip="Notificaciones" tooltipPosition="bottom" size="small" styleClass="!text-base"></p-button>
            @if (notificationCenterService.hasUnread()) {
            <p-badge [value]="notificationCenterService.unreadCount().toString()" severity="danger" styleClass="absolute -top-2 -right-2 text-[10px] min-w-4 h-4 flex items-center justify-center animate-pulse-badge pointer-events-none"></p-badge>
            }
        </span>
        <div class="topbar-profile">
            <button class="topbar-profile-button" type="button" pStyleClass="@next" enterFromClass="hidden" enterActiveClass="animate-scalein" leaveToClass="hidden" leaveActiveClass="animate-fadeout" [hideOnOutsideClick]="true">
                <p-avatar [label]="(user?.name?.charAt(0) || 'U') + (user?.name?.charAt(0) || '')" size="large" shape="circle" styleClass="text-lg mr-2 font-semibold bg-primary text-primary-contrast" />

                <span class="profile-details">
                    <span class="profile-name">{{user?.name}}</span>
                    <span class="profile-job">{{user?.role}}</span>
                </span>
                <i class="pi pi-angle-down"></i>
            </button>
            <ul class="list-none hidden p-2 sm:p-4 m-0 rounded-border shadow absolute bg-surface-0 dark:bg-surface-900 origin-top w-48 mt-2 right-0 top-auto">
                <li class="flex items-start flex-col">
                    <a pRipple routerLink="/app/administracion" class="flex p-2 rounded-border w-full items-center hover:bg-emphasis transition-colors duration-150 cursor-pointer">
                        <i class="pi pi-briefcase mr-4"></i>
                        <span>Administración</span>
                    </a>
                    <a pRipple (click)="logout()" class="flex p-2 rounded-border w-full items-center hover:bg-emphasis transition-colors duration-150 cursor-pointer">
                        <i class="pi pi-power-off mr-4"></i>
                        <span>Cerrar Sesión</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
